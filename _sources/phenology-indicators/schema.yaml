$schema: https://json-schema.org/draft/2020-12/schema
description: Phenology temporal indicators
type: object
required: [indicator_type]
properties:
  indicator_type: {type: string, enum: [linear_trend, anomaly_index, change_point, acceleration]}
  coverage_id: {type: string}
  ebv_entity: {type: string}
  trend:
    type: object
    properties: {slope: {type: number}, r_squared: {type: number}, p_value: {type: number}}
  anomalous_years: {type: array, items: {type: integer}}
  interpretation:
    type: object
    properties: {climate_signal: {type: string}, confidence: {type: string}, summary: {type: string}}
