$schema: https://json-schema.org/draft/2020-12/schema
description: EBV phenology properties for map feature view
type: object
properties:

  entity_type:
    type: string
    title: Forest Entity Type
    description: The ecosystem entity type for which the phenology metric is derived.
    x-jsonld-id: https://w3id.org/ogc/hosted/ebv-phenology/entity_type
    x-jsonld-prefLabel:
      - "@value": "Forest Entity Type"
        "@language": "en"
      - "@value": "Tipo de Entidad Forestal"
        "@language": "es"
      - "@value": "森林实体类型"
        "@language": "zh"
      - "@value": "Tip de Entitate Forestieră"
        "@language": "ro"
    x-jsonld-definition:
      - "@value": "Identifies the ecosystem entity: Coniferous forest (evergreen trees that photosynthesize year-round) or Deciduous forest (trees that shed leaves seasonally)."
        "@language": "en"
      - "@value": "Identifica la entidad del ecosistema: Bosque Conífero (árboles de hoja perenne) o Bosque Caducifolio (árboles que pierden las hojas estacionalmente)."
        "@language": "es"
      - "@value": "标识生态系统实体：针叶林（常绿乔木）或落叶林（季节性落叶乔木）。"
        "@language": "zh"
      - "@value": "Identifică entitatea ecosistemului: Pădure de Conifere (arbori veșnic verzi) sau Pădure Caducă (arbori care își pierd frunzele sezonier)."
        "@language": "ro"

  year:
    type: integer
    title: Observation Year
    x-jsonld-id: https://w3id.org/ogc/hosted/ebv-phenology/year
    x-jsonld-prefLabel:
      - "@value": "Observation Year"
        "@language": "en"
      - "@value": "Año de Observación"
        "@language": "es"
      - "@value": "观测年份"
        "@language": "zh"
      - "@value": "Anul Observației"
        "@language": "ro"
    x-jsonld-definition:
      - "@value": "The calendar year of the MODIS satellite observation from which the phenology metric was derived (2001–2018)."
        "@language": "en"
      - "@value": "Año calendario de la observación por satélite MODIS a partir del cual se derivó la métrica de fenología (2001–2018)."
        "@language": "es"
      - "@value": "导出物候指标的MODIS卫星观测日历年（2001-2018年）。"
        "@language": "zh"
      - "@value": "Anul calendaristic al observației prin satelit MODIS din care a fost derivată metrica fenologică (2001–2018)."
        "@language": "ro"

  vap_doy:
    type: integer
    title: Start of VAP (Day of Year)
    x-jsonld-id: https://w3id.org/ogc/hosted/ebv-phenology/vap_doy
    x-jsonld-prefLabel:
      - "@value": "Start of Vegetation Active Period (Day of Year)"
        "@language": "en"
      - "@value": "Inicio del Período Activo de Vegetación (Día del Año)"
        "@language": "es"
      - "@value": "植被活跃期起始（年日数）"
        "@language": "zh"
      - "@value": "Începutul Perioadei Active a Vegetației (Ziua Anului)"
        "@language": "ro"
    x-jsonld-definition:
      - "@value": "Day of Year (1–365) when vegetation becomes active. For coniferous forest: the day when snow cover decreases during spring melt (proxy for photosynthesis onset). For deciduous: the day of bud break and leaf unfolding."
        "@language": "en"
      - "@value": "Día del Año (1–365) en que la vegetación se activa. Para coníferas: día de reducción de cobertura nival en primavera. Para caducifolias: día de brotación y despliegue foliar."
        "@language": "es"
      - "@value": "植被变活跃的年日数（1-365）。针叶林：春季积雪减少的那天（光合作用开始的代理指标）。落叶林：芽苞开裂和叶片展开的那天。"
        "@language": "zh"
      - "@value": "Ziua anului (1–365) când vegetația devine activă. Pentru conifere: ziua reducerii zăpezii primăvara. Pentru caducifolii: ziua dezmugurului și desfacerii frunzelor."
        "@language": "ro"

  mean_doy:
    type: number
    title: Mean DOY (spatial average)
    x-jsonld-id: https://w3id.org/ogc/hosted/ebv-phenology/mean_doy
    x-jsonld-prefLabel:
      - "@value": "Spatial Mean DOY"
        "@language": "en"
      - "@value": "Media Espacial del Día del Año"
        "@language": "es"
      - "@value": "空间平均年日数"
        "@language": "zh"
      - "@value": "Media Spațială a Zilei Anului"
        "@language": "ro"
    x-jsonld-definition:
      - "@value": "Arithmetic mean of DOY values across all valid (non-masked) pixels in the grid for this year and entity. Derived from the 0.05° × 0.05° MODIS grid over Finland."
        "@language": "en"
      - "@value": "Media aritmética de los valores DOY en todos los píxeles válidos de la malla para este año y entidad. Derivada de la malla MODIS de 0.05° × 0.05° sobre Finlandia."
        "@language": "es"
      - "@value": "本年度和实体所有有效（未遮蔽）像素上DOY值的算术平均值，来源于芬兰0.05°×0.05° MODIS网格。"
        "@language": "zh"
      - "@value": "Media aritmetică a valorilor DOY pentru toți pixelii valizi din grilă. Derivată din grila MODIS de 0,05° × 0,05° pentru Finlanda."
        "@language": "ro"

  min_doy:
    type: integer
    title: Minimum DOY
    x-jsonld-id: https://w3id.org/ogc/hosted/ebv-phenology/min_doy
    x-jsonld-prefLabel:
      - "@value": "Minimum DOY (earliest green-up)"
        "@language": "en"
      - "@value": "DOY Mínimo (brotación más temprana)"
        "@language": "es"
      - "@value": "最小年日数（最早绿化）"
        "@language": "zh"
      - "@value": "DOY Minim (cea mai timpurie înverzire)"
        "@language": "ro"

  max_doy:
    type: integer
    title: Maximum DOY
    x-jsonld-id: https://w3id.org/ogc/hosted/ebv-phenology/max_doy
    x-jsonld-prefLabel:
      - "@value": "Maximum DOY (latest green-up)"
        "@language": "en"
      - "@value": "DOY Máximo (brotación más tardía)"
        "@language": "es"
      - "@value": "最大年日数（最晚绿化）"
        "@language": "zh"
      - "@value": "DOY Maxim (cea mai târzie înverzire)"
        "@language": "ro"

  stddev:
    type: number
    title: Standard Deviation of DOY
    x-jsonld-id: https://w3id.org/ogc/hosted/ebv-phenology/stddev
    x-jsonld-prefLabel:
      - "@value": "Standard Deviation of DOY"
        "@language": "en"
      - "@value": "Desviación Estándar del DOY"
        "@language": "es"
      - "@value": "年日数标准差"
        "@language": "zh"
      - "@value": "Abaterea Standard a DOY"
        "@language": "ro"
    x-jsonld-definition:
      - "@value": "Spatial variability of the VAP start date across the grid. High values indicate heterogeneous phenology (e.g., strong latitudinal gradient). Units: days."
        "@language": "en"
      - "@value": "Variabilidad espacial de la fecha de inicio del VAP en la malla. Valores altos indican fenología heterogénea (p.ej. gradiente latitudinal marcado). Unidades: días."
        "@language": "es"

  valid_percent:
    type: number
    title: Valid Pixel Percentage
    x-jsonld-id: https://w3id.org/ogc/hosted/ebv-phenology/valid_percent
    x-jsonld-prefLabel:
      - "@value": "Percentage of Valid Pixels"
        "@language": "en"
      - "@value": "Porcentaje de Píxeles Válidos"
        "@language": "es"
      - "@value": "有效像素百分比"
        "@language": "zh"
      - "@value": "Procentaj de Pixeli Valizi"
        "@language": "ro"
    x-jsonld-definition:
      - "@value": "Percentage of grid cells with valid (non-masked) values. Masking removes open water, clouds and non-forest areas. The bounding box covers all of Finland plus surrounding waters."
        "@language": "en"
      - "@value": "Porcentaje de celdas de la malla con valores válidos. La máscara elimina aguas abiertas, nubes y áreas no forestales."
        "@language": "es"

  crs:
    type: string
    title: Coordinate Reference System
    x-jsonld-id: https://covjson.org/def/core#referenceSystem
    x-jsonld-prefLabel:
      - "@value": "Coordinate Reference System"
        "@language": "en"
      - "@value": "Sistema de Referencia de Coordenadas"
        "@language": "es"
      - "@value": "坐标参考系统"
        "@language": "zh"
      - "@value": "Sistem de Referință pentru Coordonate"
        "@language": "ro"
    x-jsonld-definition:
      - "@value": "The geodetic datum and coordinate system used. CRS84 = WGS 84 geographic latitude/longitude (EPSG:4326). All MODIS observations were reprojected to this CRS."
        "@language": "en"
      - "@value": "El datum geodésico y sistema de coordenadas utilizado. CRS84 = WGS 84 latitud/longitud geográfica (EPSG:4326)."
        "@language": "es"

  grid_width:
    type: integer
    title: Grid Width (columns)
    x-jsonld-id: https://covjson.org/def/core#axisSize
    x-jsonld-prefLabel:
      - "@value": "Grid Width (number of columns)"
        "@language": "en"
      - "@value": "Ancho de Malla (número de columnas)"
        "@language": "es"
      - "@value": "网格宽度（列数）"
        "@language": "zh"
      - "@value": "Lățimea Grilei (număr de coloane)"
        "@language": "ro"

  grid_height:
    type: integer
    title: Grid Height (rows)
    x-jsonld-id: https://covjson.org/def/core#axisSize
    x-jsonld-prefLabel:
      - "@value": "Grid Height (number of rows)"
        "@language": "en"
      - "@value": "Alto de Malla (número de filas)"
        "@language": "es"
      - "@value": "网格高度（行数）"
        "@language": "zh"
      - "@value": "Înălțimea Grilei (număr de rânduri)"
        "@language": "ro"

  sensor:
    type: string
    title: Source Sensor Platform
    x-jsonld-id: http://www.w3.org/ns/prov#wasGeneratedBy
    x-jsonld-prefLabel:
      - "@value": "Source Sensor Platform"
        "@language": "en"
      - "@value": "Plataforma Sensora Fuente"
        "@language": "es"
      - "@value": "源传感器平台"
        "@language": "zh"
      - "@value": "Platforma Senzorului Sursă"
        "@language": "ro"
    x-jsonld-definition:
      - "@value": "The satellite sensor used to derive the phenology product. MODIS Terra Level 1B provides 1 km and 500 m resolution observations. Data from LAADS DAAC and from FMI's receiving station in Sodankylä (from 2009)."
        "@language": "en"
      - "@value": "El sensor de satélite utilizado para derivar el producto de fenología. MODIS Terra Nivel 1B proporciona observaciones a 1 km y 500 m. Datos de LAADS DAAC y estación FMI en Sodankylä (desde 2009)."
        "@language": "es"

  algorithm:
    type: string
    title: Derivation Algorithm
    x-jsonld-id: http://www.w3.org/ns/prov#used
    x-jsonld-prefLabel:
      - "@value": "Derivation Algorithm"
        "@language": "en"
      - "@value": "Algoritmo de Derivación"
        "@language": "es"
      - "@value": "推导算法"
        "@language": "zh"
      - "@value": "Algoritmul de Derivare"
        "@language": "ro"
    x-jsonld-definition:
      - "@value": "The algorithm used to extract the phenology date. FSC (Fractional Snow Cover): sigmoid function fitted to snow-melt time series for coniferous. NDWI (Normalized Difference Water Index): threshold on leaf water content time series for deciduous."
        "@language": "en"
      - "@value": "Algoritmo utilizado para extraer la fecha de fenología. FSC: función sigmoide sobre serie temporal de fusión de nieve (coníferas). NDWI: umbral sobre serie temporal del índice de agua foliar (caducifolias)."
        "@language": "es"

  trend_slope:
    type: number
    title: Trend Slope (days/year)
    x-jsonld-id: https://w3id.org/ogc/hosted/ebv-phenology/trend_slope
    x-jsonld-prefLabel:
      - "@value": "Linear Trend Slope (days per year)"
        "@language": "en"
      - "@value": "Pendiente de Tendencia Lineal (días por año)"
        "@language": "es"
      - "@value": "线性趋势斜率（天/年）"
        "@language": "zh"
      - "@value": "Panta Tendinței Liniare (zile pe an)"
        "@language": "ro"
    x-jsonld-definition:
      - "@value": "Rate of change of the VAP start date over the 2001–2018 period, in days per year. Negative values indicate earlier spring onset (advancement). Positive values indicate later onset (delay)."
        "@language": "en"
      - "@value": "Tasa de cambio de la fecha de inicio del VAP en el período 2001–2018, en días por año. Valores negativos indican inicio de primavera más temprano (adelanto). Valores positivos indican inicio más tardío (retraso)."
        "@language": "es"
      - "@value": "2001-2018年间VAP起始日期的变化速率（天/年）。负值表示春季提前（超前），正值表示春季推迟（滞后）。"
        "@language": "zh"

  anomaly:
    type: string
    title: Annual Anomaly Status
    x-jsonld-id: https://w3id.org/ogc/hosted/ebv-phenology/anomaly
    x-jsonld-prefLabel:
      - "@value": "Annual Anomaly Status"
        "@language": "en"
      - "@value": "Estado de Anomalía Anual"
        "@language": "es"
      - "@value": "年度异常状态"
        "@language": "zh"
      - "@value": "Statusul Anomaliei Anuale"
        "@language": "ro"
    x-jsonld-definition:
      - "@value": "Whether the annual mean DOY deviates significantly from the 2001–2018 baseline. 'early': > 7 days earlier than baseline; 'late': > 7 days later; 'normal': within ±7 days."
        "@language": "en"
      - "@value": "Si la media anual del DOY se desvía significativamente de la línea base 2001–2018. 'early': > 7 días antes; 'late': > 7 días después; 'normal': dentro de ±7 días."
        "@language": "es"

required:
  - entity_type
  - year
  - vap_doy
